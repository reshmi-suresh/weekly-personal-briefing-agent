<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Weekly digest</title>
</head>
<body style="margin:0;padding:0;background-color:#ffffff;color:#000000;font-family:Georgia,'Times New Roman',serif;-webkit-text-size-adjust:100%;-ms-text-size-adjust:100%;">
  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background-color:#ffffff;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:600px;width:100%;">
          <!-- Header -->
          <tr>
            <td style="padding-bottom:24px;border-bottom:1px solid #e0e0e0;">
              <p style="margin:0 0 8px 0;font-family:Arial,Helvetica,sans-serif;font-size:12px;letter-spacing:0.08em;text-transform:uppercase;color:#888888;">
                {{DATE}} · Weekly digest
              </p>
              <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:400;line-height:1.3;color:#000000;">
                <em style="font-style:italic;">{{HEADLINE}}</em>
              </h1>
            </td>
          </tr>

          <!-- TL;DR -->
          <tr>
            <td style="padding:28px 0;border-bottom:1px solid #e0e0e0;">
              <p style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:#888888;">
                TL;DR
              </p>
              <ol style="margin:0;padding-left:20px;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.6;color:#000000;">
                {{TLDR_ITEMS}}
              </ol>
            </td>
          </tr>

          <!-- Intro -->
          <tr>
            <td style="padding:28px 0;border-bottom:1px solid #e0e0e0;">
              <p style="margin:0 0 16px 0;font-family:Arial,Helvetica,sans-serif;font-size:16px;line-height:1.65;color:#000000;">
                {{INTRO}}
              </p>
              <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:#888888;">
                {{STATS}}
              </p>
            </td>
          </tr>

          <!-- To-dos -->
          <tr>
            <td style="padding:28px 0;border-bottom:1px solid #e0e0e0;">
              <h2 style="margin:0 0 16px 0;font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:400;color:#000000;">
                To-dos
              </h2>
              <ul style="margin:0;padding:0;list-style:none;">
                {{TODO_ITEMS}}
              </ul>
            </td>
          </tr>

          <!-- This week -->
          <tr>
            <td style="padding:28px 0;border-bottom:1px solid #e0e0e0;">
              <h2 style="margin:0 0 16px 0;font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:400;color:#000000;">
                This week
              </h2>
              {{EVENT_ITEMS}}
            </td>
          </tr>

          <!-- Unread emails -->
          <tr>
            <td style="padding:28px 0;border-bottom:1px solid #e0e0e0;">
              <h2 style="margin:0 0 16px 0;font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:400;color:#000000;">
                Unread emails
              </h2>
              {{EMAIL_ITEMS}}
            </td>
          </tr>

          <!-- Errors (optional) -->
          {{ERRORS_SECTION}}

          <!-- Footer -->
          <tr>
            <td style="padding-top:28px;">
              <p style="margin:0;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#888888;">
                Generated by weekly-briefing-agent
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
